name: Update Download Counts

on:
  schedule:
    # Runs daily at midnight UTC
    - cron: "0 0 * * *"
  workflow_dispatch: # Manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  update-downloads:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install google-play-scraper

      - name: Fetch & update download counts
        env:
          ITCH_API_KEY: ${{ secrets.ITCH_API_KEY }}
        run: node scripts/update-downloads.mjs

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add games.json
          git diff --cached --quiet || git commit -m "chore: update download counts [automated]"
          git push
