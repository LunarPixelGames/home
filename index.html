<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LunarPixel Games</title>
    <link rel="icon" type="image/png" href="favicon.png" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <nav class="top-nav">
        <img src="favicon.png" alt="LunarPixel Logo" class="site-logo" />
        <span class="logo">LunarPixel</span>
        <button id="theme-toggle" aria-label="Toggle theme">
          <svg
            class="theme-icon"
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <circle cx="12" cy="12" r="5"></circle>
            <line x1="12" y1="1" x2="12" y2="3"></line>
            <line x1="12" y1="21" x2="12" y2="23"></line>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
            <line x1="1" y1="12" x2="3" y2="12"></line>
            <line x1="21" y1="12" x2="23" y2="12"></line>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
          </svg>
        </button>
      </nav>
      <div class="hero-content">
        <h1 id="studio-name">LunarPixel Games</h1>
        <p id="studio-tagline" class="subtitle">crafting digital dreams</p>
      </div>
    </header>

    <main class="container">
      <section class="about-section">
        <p id="studio-about">Loading studio details...</p>
        <div class="about-links">
          <a id="github-link" href="#" target="_blank" class="text-link">
            View on GitHub &rarr;
          </a>
          <a
            id="youtube-link"
            href="https://youtube.com/@LunarPixelGames"
            target="_blank"
            class="text-link"
          >
            Visit YouTube &rarr;
          </a>
        </div>
      </section>

      <div id="games-grid" class="games-grid">
        <!-- Injected by JavaScript -->
      </div>
    </main>

    <footer>
      <p>&copy; <span id="year"></span> LunarPixel Games. Made with ❤️.</p>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
