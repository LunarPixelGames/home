<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LunarPixel | Indie Game Studio</title>
    <link rel="icon" type="image/png" href="favicon.png" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Subtle Noise Texture Overlay -->
    <div class="noise-overlay"></div>

    <header class="site-header">
      <div class="logo-area">
        <img src="favicon.png" alt="LunarPixel Logo" class="site-logo" />
        <h1 id="studio-name" class="site-title">LunarPixel</h1>
      </div>
      <p id="studio-tagline" class="site-tagline">
        independent game developer & digital tinkerer
      </p>
    </header>

    <main class="content-wrapper">
      <section class="about-section">
        <p id="studio-about" class="about-text">Loading...</p>
        <nav class="about-links">
          <a id="github-link" href="#" target="_blank" class="pixel-link"
            >GitHub</a
          >
          <a
            id="youtube-link"
            href="https://youtube.com/@LunarPixelGames"
            target="_blank"
            class="pixel-link"
            >YouTube</a
          >
          <a href="mailto:sameer.adnan@proton.me" class="pixel-link">Contact</a>
        </nav>
      </section>

      <section class="projects-section">
        <div class="section-header">
          <h2 class="section-title">Projects</h2>
          <div class="view-toggle">
            <button
              id="card-view-btn"
              class="toggle-btn active"
              title="Card View"
            >
              <svg
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <rect x="3" y="3" width="7" height="7"></rect>
                <rect x="14" y="3" width="7" height="7"></rect>
                <rect x="14" y="14" width="7" height="7"></rect>
                <rect x="3" y="14" width="7" height="7"></rect>
              </svg>
            </button>
            <button id="list-view-btn" class="toggle-btn" title="List View">
              <svg
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <line x1="8" y1="6" x2="21" y2="6"></line>
                <line x1="8" y1="12" x2="21" y2="12"></line>
                <line x1="8" y1="18" x2="21" y2="18"></line>
                <line x1="3" y1="6" x2="3.01" y2="6"></line>
                <line x1="3" y1="12" x2="3.01" y2="12"></line>
                <line x1="3" y1="18" x2="3.01" y2="18"></line>
              </svg>
            </button>
          </div>
        </div>
        <div id="games-grid" class="projects-grid">
          <!-- Projects injected by JS -->
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <p>&copy; <span id="year"></span> LunarPixel.</p>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
