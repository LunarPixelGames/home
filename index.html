<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LunarPixel Games</title>
    <link rel="icon" type="image/png" href="favicon.png" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Atmospheric Background -->
    <div class="stars-container" id="stars"></div>
    <div class="nebula nebula-1"></div>
    <div class="nebula nebula-2"></div>

    <header>
      <nav class="top-nav">
        <div class="logo-container">
          <img src="favicon.png" alt="LunarPixel Logo" class="site-logo" />
          <span class="logo">LunarPixel</span>
        </div>
      </nav>
      <div class="hero-content">
        <h1 id="studio-name">LunarPixel Games</h1>
        <p id="studio-tagline" class="subtitle">crafting digital dreams</p>
      </div>
    </header>

    <main class="container">
      <section class="about-section">
        <p id="studio-about">Loading studio details...</p>
        <div class="about-links">
          <a id="github-link" href="#" target="_blank" class="text-link">
            View on GitHub &rarr;
          </a>
          <a
            id="youtube-link"
            href="https://youtube.com/@LunarPixelGames"
            target="_blank"
            class="text-link"
          >
            Visit YouTube &rarr;
          </a>
        </div>
      </section>

      <div id="games-grid" class="games-grid">
        <!-- Injected by JavaScript -->
      </div>
    </main>

    <footer>
      <p>&copy; <span id="year"></span> LunarPixel Games. Made with ❤️.</p>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
